{% extends "base.html" %}
{% load static %}

{% block title %}참여하기{% endblock %}

{% block content %}

<div class="register-container">

    <h1>🙋 참여하기</h1>

    <p class="subtitle">
        등록한 이름과 캠퍼스를 입력해주세요.
    </p>

    <form method="post">

        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="error-box">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        <div class="form-group">
            <label for="{{ form.name.id_for_label }}">이름</label>
            {{ form.name }}
        </div>

        <div class="form-group">
            <label>캠퍼스</label>
            {{ form.campus }}
        </div>

        <button type="submit" class="main-btn">
            참여하기
        </button>

    </form>

</div>

{% endblock %}
