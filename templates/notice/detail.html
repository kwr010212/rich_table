{% extends "base.html" %}

{% block title %}
{{ notice.title }}
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-body">

            <h2>{{ notice.title }}</h2>

            <p class="text-muted">
                {{ notice.created_at|date:"Y년 m월 d일 H:i" }}
            </p>

            <hr>

            <p style="white-space: pre-line;">
                {{ notice.content }}
            </p>

            <hr>

            <a
                href="{% url 'main:dashboard' %}"
                class="btn btn-secondary"
            >
                ← 대시보드로 돌아가기
            </a>

        </div>

    </div>

</div>

{% endblock %}
