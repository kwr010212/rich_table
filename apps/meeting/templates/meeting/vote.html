{% extends "base.html" %}

{% block title %}
요일 투표
{% endblock %}

{% block content %}

<div class="container py-4">

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="text-center mb-4">

                <h2 class="fw-bold">
                    📅 {{ meeting.title }}
                </h2>

                {% if meeting.description %}
                    <p class="text-muted">
                        {{ meeting.description }}
                    </p>
                {% endif %}

            </div>

            <form method="post">

                {% csrf_token %}

                <div class="mb-4">

                    <label class="form-label fw-semibold mb-3">
                        가능한 시간을 선택해주세요.
                    </label>

                    {% for checkbox in form.candidates %}

                        <div class="form-check mb-2">

                            {{ checkbox.tag }}

                            <label class="form-check-label ms-2" for="{{ checkbox.id_for_label }}">
                                {{ checkbox.choice_label }}
                            </label>

                        </div>

                    {% endfor %}

                </div>

                <div class="d-grid">

                    <button
                        type="submit"
                        class="btn btn-success btn-lg"
                    >
                        투표 완료
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
